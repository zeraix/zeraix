# electron-builder Packaging configuration
# Documentation: https://www.electron.build/configuration
appId: com.zeraix.app
productName: Zeraix
# Include "edition" in the product name (NEXT_PUBLIC_APP_EDITION: cn / intl) so that the domestic and international installation packages have distinct names and do not overwrite each other.
# This variable is injected by the `dist:*` scripts using `cross-env` (see `package.json`).
artifactName: ${productName}-${env.NEXT_PUBLIC_APP_EDITION}-${version}.${ext}
# Inject `productName` into the bundled `package.json` so that `app.getName()` returns "Zeraix" across all packaged platforms
# (otherwise, Windows/Linux would fall back to the `package.json` name "Zeraix," whereas macOS relies on `CFBundleName` to yield "Zeraix").
# This ensures that the `userData`, Llama runtime, and QEMU image directories use "Zeraix" in the packaged version, while the development environment continues to use "Zeraix" from the source `package.json`.
extraMetadata:
  productName: Zeraix
# Auto-update feed. Without a `publish` block electron-builder never emits the
# latest.yml / latest-mac.yml manifests that electron-updater reads, so this is what turns
# auto-update on. The repo is public, so the app reads the feed anonymously — no token ships
# in the installer.
# NOTE: the release must be *published*; electron-updater cannot see draft releases
# anonymously (.github/workflows/release.yml creates drafts, so publishing is a manual gate).
# NOTE: artifactName embeds the edition, but latest.yml does NOT — if the `cn` edition is ever
# published to this same repo it would overwrite intl's manifest. CI only builds intl today;
# give cn its own `channel` (or its own feed) before publishing both here.
publish:
  - provider: github
    owner: zeraix
    repo: zeraix

directories:
  output: dist-electron
  # /build has been added to .gitignore; bundled assets such as icons (icon.ico / icon.icns) are located in resources/.
  buildResources: resources

# Package only the Electron main process and the Next.js static export output;
# the rendering layer consists of pure static files and does not require bundling node_modules.
files:
  - electron/**/*
  # Next.js static export directory (distDir: "Zeraix" in next.config.ts; the main process loads files from this directory via the app:// protocol)
  - Zeraix/**/*
  - package.json
  - "!node_modules"
  # The main process uses the OpenAI SDK to make requests (zero runtime dependencies); this module must be included in the build bundle.
  - node_modules/openai/**/*
  # PTY backend for the built-in terminal (native module): Bundled with the main process; its .node binary must be extracted via asarUnpack (see below). 
  # electron-builder defaults to npmRebuild=true, which recompiles node-pty against the Electron ABI for the target platform.
  - node_modules/node-pty/**/*
  # Note: The runtime dependencies for QEMU—control.mjs and ninep-server.mjs—have been merged into electron/tools/sandbox/
  # and are bundled together via the electron/**/* pattern above (sandbox/ is no longer listed separately). The remaining files in sandbox/ are build-time artifacts and are not included in the bundle.

# Disable native module recompilation: node-pty 1.1.0 uses node-addon-api (N-API),
# and its prebuilt artifact (prebuilds/<platform>-<arch>/pty.node) exports
# napi_register_module_v1. Since the ABI is stable between Node and Electron,
# there is no need to recompile against the Electron ABI (node-pty's loader,
# lib/utils.js, will fall back to the prebuilds/ directory). The default
# npmRebuild=true triggers node-gyp rebuild, which fails on build machines
# lacking VS C++ or the Windows SDK; disabling this allows the existing
# N-API prebuilt binaries to be packaged directly.
npmRebuild: false

asar: true

# Native .node binary modules cannot be loaded via dlopen from within an asar archive; they must be unpacked to app.asar.unpacked/.
# node-pty serves as the PTY backend for the built-in terminal and must be unpacked in order to load.
asarUnpack:
  - node_modules/node-pty/**/*

# Custom Protocol (Deep Link): The "Open Zeraix" button on the Google login callback page points to `zeraix://…`,
# bringing the running application to the foreground. Based on this, electron-builder configures the macOS `Info.plist` (`CFBundleURLTypes`)
# and the Windows installer registry keys. The scheme must match `DEEP_LINK_SCHEME` in `electron/services/deepLink.mjs`.
protocols:
  - name: Zeraix
    schemes:
      - zeraix

# Permissions for QEMU's HVF hypervisor are now granted directly to the nested binary
# via `entitlementsInherit` (`resources/entitlements.mac.inherit.plist`) during the
# standard signing phase, rather than via a post-signing step (`afterSign`).
# Reason: `electron-builder` performs notarization before triggering `afterSign`
# (following the sequence: sign → notarize → `afterSign`); re-signing QEMU
# during `afterSign` would invalidate the notarization seal.

# After all build artifacts are generated: Sign, notarize, and staple the DMG (Gatekeeper requires the DMG itself to be both signed and notarized/stapled).
# Gracefully skip this step if credentials are missing (i.e., no secrets available locally or in CI). Since this application does not support auto-updates, modifying the DMG does not affect the .blockmap.
afterAllArtifactBuild: scripts/afterAllArtifactBuild.cjs

# Native binaries bundled in the package: QEMU sandbox only (layout: <platform>-<arch>/qemu/).
# `download-bin-*.mjs` first places files in `resources/bin/<platform>-<arch>/`; here, they are copied as-is into the `Contents/Resources/` root:
#   `qemu.mjs` consumes them from `process.resourcesPath/<platform>-<arch>/qemu`.
# Llama inference binaries are not distributed within the package: at runtime, `llamaInstaller.mjs` downloads them from the CDN (llama.cpp GitHub release builds) to `userData`.
# (Directory names use `darwin`/`win32`/`linux`—differing from electron-builder's `${os}` macro "mac"—so they are copied directly based on `<os>-*`.)
# The corresponding `<arch>/` directories for macOS and Windows are generated prior to packaging via `npm run bundle:bin:mac` and `npm run bundle:bin:win`, respectively.
# `rootfs.qcow2`, `Image`, and `initrd.img` are large; upon first run, they are downloaded to `~/.zeraix/vm` as per `sandbox/qemu/README.md`.
# Release signing: electron-builder re-signs nested binaries using a Developer ID and applies `entitlementsInherit` (including hypervisor entitlements);
# the bundled `qemu-system-*` binaries thus retain HVF permissions. Llama binaries are not in the package (downloaded at runtime, see below) and are not included in this signing/notarization process.
# See the macOS configuration below for Hardened Runtime and notarization details.
extraResources:
  - from: resources/bin
    filter:
      - "darwin-*/**"
      - "win32-*/**"

# Keep only the English language pack
# Filter locales/*.pak on Windows/Linux; filter .lproj directories on macOS
electronLanguages:
  - en-US

win:
  target:
    - target: nsis
      arch: [x64]
  # Code signing (prevents SmartScreen "Unknown Publisher" warnings when distributing to other Windows systems). As with macOS, certificate credentials are not stored in the repository:
  # Injected via environment variables — CSC_LINK (path to .pfx certificate file or its base64 content) and CSC_KEY_PASSWORD (certificate password).
  # (Automatically read by electron-builder; works for both macOS and Windows). If credentials are missing (e.g., local builds or CI runs without secrets), signing is gracefully skipped, and an unsigned installer is still generated. 
  # Starting with electron-builder 26, Windows signing options have been consolidated under signtoolOptions (fields previously located directly under win.* have been migrated here).
  signtoolOptions:
  # Certificate source: By default, it uses the CSC_LINK / CSC_KEY_PASSWORD environment variables mentioned above; if you need to specify them explicitly here, you can use
  # certificateFile + certificatePassword (.pfx file), or certificateSubjectName / certificateSha1 (retrieved from the Windows certificate store or HSM).
    signingHashAlgorithms:
      - sha256
    # RFC 3161 Timestamping: Ensures signatures remain valid long after the certificate expires (without a timestamp, the signature becomes invalid as soon as the certificate expires).
    rfc3161TimeStampServer: http://timestamp.digicert.com
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  # arm64 (Apple Silicon) only: The x64 version lacks native darwin-x64 binaries (as llama/qemu are bundled based on the build machine's architecture),
  # and the resulting Intel package renders local models and the sandbox unusable, so it is no longer being produced.
  target:
    - target: dmg
      arch: [arm64]
    # Required for auto-update: Squirrel.Mac updates from a .zip, never from a .dmg.
    # The dmg remains the first-install download; the zip is what electron-updater fetches
    # (it is listed in latest-mac.yml). Dropping this silently disables mac auto-update.
    - target: zip
      arch: [arm64]
  category: public.app-category.productivity
  # Hardened Runtime + Signing/Notarization (prerequisite for distribution to other Macs; prevents Gatekeeper from blocking the app with a "damaged" error).
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  # Notarization: Disable electron-builder's built-in ".app notarization." Instead, use the `afterAllArtifactBuild` hook to perform a single
  # "Sign → Notarize → Staple" workflow on the actual distribution artifact—the DMG (see `scripts/afterAllArtifactBuild.cjs`; this covers the internal app as well). 
  # Reason: electron-builder only notarizes the `.app`, leaving the resulting DMG unsigned, which causes Gatekeeper to block it with a "no usable signature" error upon opening;
  # notarizing both the app and the DMG separately would require two uploads, resulting in redundancy and slower speeds. Therefore, only the DMG distribution artifact is notarized.
  notarize: false
