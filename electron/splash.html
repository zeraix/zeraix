<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zeraix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: transparent;
    -webkit-user-select: none; user-select: none;
    cursor: default;
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  /* 整块可拖动，无边框窗口靠此移动 */
  .stage {
    position: relative;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    -webkit-app-region: drag;
    /* 深色品牌底：径向暖金光晕叠加近黑背景 */
    background:
      radial-gradient(120% 120% at 50% 38%, #26221a 0%, #17151100 60%),
      linear-gradient(160deg, #121110 0%, #0b0a09 100%);
    border-radius: 16px;
    border: 1px solid rgba(212,175,55,0.14);
    box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    overflow: hidden;
  }
  /* 呼吸光晕 */
  .halo {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.28) 0%, rgba(212,175,55,0) 68%);
    filter: blur(18px);
    animation: pulse 3.2s ease-in-out infinite;
    top: 50%; left: 50%;
    transform: translate(-50%, -58%);
  }
  .logoWrap {
    position: relative;
    width: 92px; height: 84px;
    animation: breath 3.2s ease-in-out infinite;
  }
  .logoWrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 4px 18px rgba(212,175,55,0.35));
  }

    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
    overflow: hidden; pointer-events: none;
  }
  .shine::before {
    content: ""; position: absolute; top: 0; left: 0;
    width: 55%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.85), transparent);
    animation: shimmer 2.6s ease-in-out infinite;
  }
  .wordmark {
    margin-top: 30px;
    font-size: 26px; font-weight: 700; letter-spacing: 0.42em;
    padding-left: 0.42em; /* 抵消字距造成的右偏 */
    background: linear-gradient(180deg, #f3e6b6 0%, #d4af37 55%, #b8860b 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .tagline {
    margin-top: 10px;
    font-size: 12px; letter-spacing: 0.24em; padding-left: 0.24em;
    color: rgba(237,237,237,0.5);
  }
  /* 底部进度条 */
  .bar {
    position: absolute; left: 0; bottom: 0;
    width: 100%; height: 3px;
    background: rgba(212,175,55,0.10);
    overflow: hidden;
  }
  .bar::before {
    content: ""; position: absolute; top: 0; left: 0; height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
    animation: slide 1.6s ease-in-out infinite;
  }
  @keyframes breath {
    0%, 100% { transform: scale(0.94); opacity: 0.82; }
    50%      { transform: scale(1.05); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.55; transform: translate(-50%, -58%) scale(0.92); }
    50%      { opacity: 1;    transform: translate(-50%, -58%) scale(1.08); }
  }
  @keyframes shimmer {
    0%   { transform: translateX(-160%) skewX(-18deg); }
    60%  { transform: translateX(280%)  skewX(-18deg); }
    100% { transform: translateX(280%)  skewX(-18deg); }
  }
  @keyframes slide {
    0%   { left: -40%; }
    100% { left: 100%; }
  }
  /* 主窗口就绪后由主进程注入 .leaving，淡出 */
  .stage.leaving { animation: fadeout 0.32s ease forwards; }
  @keyframes fadeout { to { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .halo, .logoWrap, .shine::before, .bar::before { animation: none; }
  }
</style>
</head>
