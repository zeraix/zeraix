name: Package installers (intl)

# Builds the Windows (.exe / nsis) and macOS (.dmg, arm64) installers for the
# international edition (NEXT_PUBLIC_APP_EDITION=intl) using the `dist:win` /
# `dist:mac` scripts in package.json.
#
# Triggers:
#   - pushing a version tag like `v1.2.3`  -> builds + attaches to a GitHub Release
#   - manual run from the Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow the release job to create/update a Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    # The committed .npmrc points at China mirrors (registry.npmmirror.com + npmmirror's
    # electron / electron-builder-binaries mirrors) for local dev. GitHub's runners are in
    # Azure outside mainland China, where those mirrors are slow and intermittently fail.
    # Env vars take precedence over .npmrc, so this redirects CI to the upstream sources
    # without touching the local setup. Applies to every step in the job (the Electron
    # binary is fetched during install, electron-builder's tooling during the build).
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      # No trailing "v" here: @electron/get appends its own "v${version}/" directory, so a
      # trailing "v" yields .../download/vv42.4.0/... and 404s. (npmmirror's layout in
      # .npmrc differs, which is why that one carries the "v".)
      NPM_CONFIG_ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
      NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            script: dist:win
            # nsis installer + blockmap + latest.yml (the auto-update manifest electron-updater
            # reads; without it on the release, no client can discover an update).
            artifact_glob: |
              dist-electron/*.exe
              dist-electron/*.exe.blockmap
              dist-electron/latest.yml
          - name: macos
            os: macos-14 # arm64 runner: mac target is arm64-only
            script: dist:mac
            # dmg = first install; zip = what Squirrel.Mac actually updates from; latest-mac.yml
            # = the manifest pointing at the zip. All three must be on the release.
            artifact_glob: |
              dist-electron/*.dmg
              dist-electron/*.dmg.blockmap
              dist-electron/*.zip
              dist-electron/*.zip.blockmap
              dist-electron/latest-mac.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Cache electron + electron-builder downloads (Electron binary, app-builder,
      # winCodeSign, nsis, etc.) to speed up subsequent runs.
      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-eb-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-eb-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Report which of the required values actually reached the runner, then fail with a
      # clear message. Without this, a missing value surfaces as an opaque Zod "Invalid URL"
      # from next.config.ts, three layers downstream of the real cause.
      # Only booleans and a length are printed — never a value.
      - name: Check required config
        shell: bash
        env:
          API: ${{ vars.NEXT_PUBLIC_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL }}
          HAS_API_VAR: ${{ vars.NEXT_PUBLIC_API_BASE_URL != '' }}
          HAS_API_SECRET: ${{ secrets.NEXT_PUBLIC_API_BASE_URL != '' }}
          HAS_GOOGLE_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID != '' }}
          HAS_GOOGLE_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET != '' }}
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL   as repository Variable : $HAS_API_VAR"
          echo "NEXT_PUBLIC_API_BASE_URL   as repository Secret   : $HAS_API_SECRET"
          echo "GOOGLE_OAUTH_CLIENT_ID     as repository Secret   : $HAS_GOOGLE_ID"
          echo "GOOGLE_OAUTH_CLIENT_SECRET as repository Secret   : $HAS_GOOGLE_SECRET"
          echo "resolved NEXT_PUBLIC_API_BASE_URL length          : ${#API}"
          fail=0
          if [ -z "$API" ]; then
            echo "::error::NEXT_PUBLIC_API_BASE_URL is empty. Add it under Settings > Secrets and variables > Actions, on either the Variables tab (preferred) or the Secrets tab. Environment secrets do NOT work: no job in this workflow declares 'environment:'."
            fail=1
          else
            case "$API" in
              http://*|https://*) ;;
              *) echo "::error::NEXT_PUBLIC_API_BASE_URL must be an absolute URL starting with http:// or https:// (got ${#API} chars). Check for stray quotes, a leading 'NEXT_PUBLIC_API_BASE_URL=' prefix, or whitespace."; fail=1 ;;
            esac
          fi
          if [ "$HAS_GOOGLE_ID" != "true" ]; then
            echo "::error::GOOGLE_OAUTH_CLIENT_ID is empty. Add it as a repository Secret (not a Variable, not an environment secret)."
            fail=1
          fi
          exit $fail

      # Export code-signing credentials ONLY when they are actually set.
      # A defined-but-empty CSC_LINK is worse than an absent one: electron-builder treats ""
      # as "a certificate path was given", resolves it against the project dir, finds a
      # directory and hard-fails with "<projectDir> not a file"
      # (app-builder-lib/out/codeSign/codesign.js:27). It only skips signing gracefully when
      # the variable is absent entirely. A YAML `env:` block cannot express "absent" — an
      # unset secret renders as "" — so the values are funnelled through $GITHUB_ENV instead.
      # Add the secrets later and signing turns on with no workflow change.
      - name: Export signing credentials (if configured)
        shell: bash
        env:
          IN_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          IN_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          IN_CSC_LINK: ${{ secrets.CSC_LINK }}
          IN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          exported=0
          export_if_set() {
            local value="${!1}" target="$2"
            [ -n "$value" ] || return 0
            {
              echo "${target}<<__CSC_EOF__"
              echo "$value"
              echo "__CSC_EOF__"
            } >> "$GITHUB_ENV"
            echo "exported ${target}"
            exported=1
          }
          export_if_set IN_WIN_CSC_LINK WIN_CSC_LINK
          export_if_set IN_WIN_CSC_KEY_PASSWORD WIN_CSC_KEY_PASSWORD
          export_if_set IN_CSC_LINK CSC_LINK
          export_if_set IN_CSC_KEY_PASSWORD CSC_KEY_PASSWORD
          if [ "$exported" = "0" ]; then
            echo "no signing certificate configured — an unsigned installer will be produced"
          fi

      - name: Build installer (${{ matrix.name }})
        run: pnpm run ${{ matrix.script }}
        env:
          # Backend API baked into the client bundle at build time. Required: .env.production
          # is gitignored and never reaches the runner. If unset, GitHub renders this as ""
          # — which fails the z.string().url() parse in src/lib/env.ts, so the build errors
          # out rather than silently shipping a wrong endpoint.
          # Accepts either a repository Variable or a Secret, so it works whichever tab it
          # was added on. Not actually secret (it ships inside the installer), so the
          # Variable is preferred — as a Secret it gets masked to *** in build logs.
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL }}

          # Google OAuth default credentials baked in by scripts/gen-google-defaults.mjs.
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

          # Code signing (optional): WIN_CSC_* / CSC_* are deliberately NOT listed here.
          # A step-level `env:` entry overrides $GITHUB_ENV, so listing them would re-introduce
          # the empty values that the "Export signing credentials" step exists to avoid.
          # Windows and macOS need different certificates — WIN_CSC_* is the Authenticode .pfx,
          # CSC_* the Apple Developer ID .p12 — each stored as base64 (`base64 -w0 cert.p12`).

          # macOS notarization (optional) — consumed by scripts/afterAllArtifactBuild.cjs.
          # Provide EITHER the Apple ID trio OR the App Store Connect API-key trio.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

          # Aliyun OSS fallback for the bundled QEMU binaries (optional). The
          # download scripts try the public CDN first, so these are only needed
          # if the CDN is unavailable.
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
          OSS_CDN: ${{ vars.OSS_CDN }}

          # Let electron-builder use a token if it ever needs GitHub (avoids anonymous rate limits).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  # Attach all installers to a single GitHub Release. Runs only for tag pushes.
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true # publish manually after you've verified the assets
          generate_release_notes: true
